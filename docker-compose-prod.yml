services:
  postgres:
    image: postgres:16
    ports:
      - 5432:5432
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    env_file:
      - ./envs/prod/postgres.env

  rabbitmq:
    image: rabbitmq:4.0-management
    ports:
      - 5672:5672
    env_file:
      - ./envs/prod/rabbitmq.env

  sisconf:
    container_name: sisconf
    build:
      context: ./
      dockerfile: ./compose/prod/Dockerfile
    ports:
      - 8080:8080
    env_file:
      - ./envs/prod/spring.env
  
  nginx:
    image: nginx:latest
    depends_on:
      - sisconf
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
  
  prometheus:
    image: prom/prometheus:latest
    ports:
      - 9090:9090
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-prod-data:/prometheus
  
  grafana:
    image: grafana/grafana:latest
    ports:
      - 3000:3000
    links:
      - postgres
    env_file:
      - ./envs/prod/grafana.env
    depends_on:
      - prometheus
      - postgres
  
  postgresql-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: postgres-exporter
    ports:
      - 9187:9187
    env_file:
      - ./envs/prod/postgres.env
    depends_on:
      - postgres

volumes:
  postgres-prod-data:
  prometheus-prod-data: