# Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.show-sql=false

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.out-of-order=true

# OAuth2 Resource Server Configuration (Mock or Disable)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8000/auth/realms/test-realm

# ENV
keycloak.server-url=${KEYCLOAK_SERVER_URL:http://localhost:8000}
keycloak.realm=${KEYCLOAK_REALM:SISCONF}
keycloak.client-id=${KEYCLOAK_CLIENT_ID:sisconf-spring-back}
keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:twvHaXNblETJpwvzWAxjrw8PM5hcLEYL}

spring.application.name=${SPRING_APPLICATION_NAME:sisconf}

# Jackson
spring.jackson.deserialization.FAIL_ON_UNKNOWN_PROPERTIES=true

# Flyway
spring.flyway.out-of-order=true
spring.flyway.enabled=true

# Spring Security
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_SERVER_URL}/realms/${KEYCLOAK_REALM}
spring.security.oauth2.resourceserver.jwk-set-uri=${spring.security.oauth2.resourceserver.jwt.issuer-uri}/protocol/openid-connect/certs

# Swagger
springdoc.swagger-ui.path=/api-docs
springdoc.writer-with-order-by-keys=true
springdoc.swagger-ui.disable-swagger-default-url=true

# RabbitMQ
spring.rabbitmq.host=${RABBIT_MQ_HOSTNAME}
spring.rabbitmq.port=${RABBIT_MQ_PORT}
spring.rabbitmq.username=${RABBIT_MQ_USERNAME}
spring.rabbitmq.password=${RABBIT_MQ_PASSWORD}
rabbitmq.orders-group-sheet-queue-name=${RABBIT_MQ_ORDERS_GROUP_SHEET_QUEUE_NAME}